<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>cgame</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            font-family: system-ui, sans-serif;
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #111;
            color: #eee;
            display: grid;
            place-items: center;
        }

        main {
            width: min(900px, calc(100vw - 32px));
        }

        h1 {
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .card {
            display: block;
            padding: 1rem;
            border: 1px solid #333;
            border-radius: 12px;
            background: #181818;
            color: inherit;
            text-decoration: none;
        }

        .card:hover {
            border-color: #777;
            background: #202020;
        }

        .card h2 {
            margin: 0 0 0.5rem;
            font-size: 1.1rem;
        }

        .card p {
            margin: 0 0 0.75rem;
            color: #bbb;
        }

        code {
            color: #aaa;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
<main>
    <h1>cgame</h1>
    <p class="subtitle">Select an app to run.</p>

    <section class="grid">
                <a class="card" href="hexatak.html">
            <h2>Hexatak</h2>
            <p>Hexagonal Tak-inspired puzzle game.</p>
            <code>hexatak.html</code>
        </a>

    </section>
</main>
</body>
</html>
